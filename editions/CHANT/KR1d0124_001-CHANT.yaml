body:
  text: 喪服古今集記宋泰豫元年明帝崩博士周洽議權制諒闇之內不親奉四時祠建元四年儉採晉由朝諒闇議奏曰權典既行喪禮斯奪事興漢世而源由甚遠殷宗諒闇非有服之稱周王即吉唯宴樂為譏春秋之義嗣君踰年即位則預朝會聘享焉左氏云凡君即位卿出竝聘踐修舊好又云諸侯即位小國聘焉以繼好結信謀事補闕禮之大者至於諒闇之內而圖婚三年未終而吉禘齊歸之喪不廢蒐𣏌公之卒不徹樂皆致譏貶以明鑒戒自斯而談朝聘蒸嘗之典卒哭而備行婚禘蒐樂之事三載而後舉通塞興廢各有由然又案大戴禮記及孔子家語竝稱武王崩成王嗣位明年六月既葬周公冠成王而朝于祖以見諸侯命祝雍作頌襄十五年十一月晉侯周卒十六年正月葬晉悼公平公既即位改服脩官蒸于曲沃禮記曾子問孔子曰天子崩國君薨則取群廟之主而藏諸祖廟禮乎卒哭成事而後主各反其廟春秋左氏傳凡君卒哭而祔祔而後特祀於主蒸嘗禘於廟先儒云特祀於主者特以喪禮奉新亡者至於寢不同於占蒸嘗禘於廟者卒哭成事群廟之主各反其廟則四時之祭皆即吉也三年喪畢吉禘於廟躋群主以定新主也凡此諸義皆著在經誥昭乎方冊所以晉宋因循同規前典卒哭公除親奉蒸嘗率禮無違因心允協爰至泰豫元年禮官立議不宜親奉乃引三年之制自天子達又據王制稱喪三年不祭唯祭天地社稷越紼而行事曾不知自天子達本在至情既葬釋除事以權奪委衰襲袞孝享宜申越紼之旨事施未葬卒哭之後何紼可越復依范宣之難杜預譙周之論士祭竝非明據晉武在喪每欲存寧戚之懷不全依諒闇之典至於四時蒸嘗蓋以哀疾未堪非便頓改舊式江左以來通儒碩學所歷多矣守而弗革義豈徒然又宣即心而言公卿大夫則負扆親臨三元告始則朝會萬國雖金石輟響而簨𧇽充庭情深於恒哀而跡降於凡制豈曰能安國家故也宗廟蒸嘗孝敬所先寧容吉事備行斯典獨廢就令必宜廢祭則應三年永闕乃復同之地故友司攝禮進退二三彌乖典衷謂宜依舊親奉從之南齊書禮志上建元四年高帝山陵昭皇后應遷祔祠部疑有祖祭及遣啟諸奠九飯之儀不儉議奠如大斂賀循云從墓之墓皆設奠如將葬廟朝之禮范甯云將窆而奠雖不稱為祖而不得無祭從之有司又奏昭皇后神主在廟今遷祔葬葬有虞以安神神既己處廟改葬出靈豈應處祭鄭注改葬云從廟之廟禮宜從同從墓之墓事何容異前代謂應無虞儉議范甯云葬必有魂車若不為其歸神將安舍世中改葬即墓所施靈設祭何得不祭而毀耶賀循云既窆設奠於墓以終其事雖非正虞亦粗相似晉氏脩復正陵宋朝敬后改葬皆有虞今設虞非疑從之南齊書禮志下建元二年皇太子妃薨前宮臣疑所服儉議禮記文王世子父在斯為子君在斯為臣且漢魏以來宮僚充備臣隸之節具體在三昔庾翼妻喪王允滕宏謂府吏宜有小君之服況臣節之重耶宜禮為舊君妻齊衰三月居官之身並合屬假朝晡哭悉繫東宮今臣之未從官在遠者於居官之所屬寧二日半仍行喪成服遺牋表不得奔赴從之太子妃斬草乘黃議建銘旌儉議禮既塗棺祝取銘置于殯東大斂畢便應建于西階之東宋大明二年太子妃薨建九旒有司又議斬莫日建旒與不若建旒應幾旒及畫龍升降云何又用幾翣儉議旒本是命服無關於凶事今公卿以下平存不能備禮故在凶乃建耳東宮秩同上公九命之儀妃與儲君一體義不容異無緣未同常例別立凶旒大明舊事是不經詳議率爾便行耳今宜考以禮典不得效九從失吉部伍自有桁輅凶部別有銘旌若復立旒復置何處翣自用八從之有司奏穆妃卒哭後靈還在道遇朔望當須設祭不儉議既虞卒哭祭之於廟本是祭序昭穆耳未全同卒吉四時之祭也所以有朔望殷事蕃國不行權制宋江夏王妃卒哭以後朔望設祭帝室既以卒哭除喪無緣方有朔望之祭靈筵雖未升廟堂而舫中即成行廟猶如桓玄及宋高祖長沙臨川二國竝有移廟之禮豈復謂靈筵在途便設殷事耶推此而言朔望不復俟祭宋懿后時舊事不及此益可知時議從之建元三年有司奏皇太子穆妃以去年七月薨其年閏九月未審當月數閏為應以閏附正月若用月數數閏者南郡王兄弟便應以此四月晦小祥至於祥月不為有疑不儉議曰三百六旬尚書明義文公納幣春秋致譏穀梁云積分而成月公羊云天無是月雖然左氏謂告朔為得禮是故先儒咸謂三年朞喪歲數沒閏大功以下月數數閏夫閏者蓋是年之餘日而月之異朔所以吳商云含閏以正朞允恊情理今杖朞之喪雖以十月而小祥至於祥縞必須周歲凡厭屈之禮要取象正明祥縞相去二月厭降小祥亦以則之又且求之名義則小祥本以年限考於倫例則相去必應二朔今以厭屈而先祥不得謂此求之非朞事既同條情無異貫沒閏之理固在言先謂令祥在此晦則去縞三月依附准例益復為礙謂應須五月晦乃祥此國之大典宜共精詳并通關入座丞郎研盡同異尚書令褚淵難儉議曰厭屈之典由所尊奪情故祥縞傋制而年月不申今以十一月而祥從朞可知既計以月數則應數閏以成典若猶含之何以異於縞制疑者正以祥之常閏月數相縣積分餘閏曆象所宏計月者數閏故有餘月計年者苞含故致盈積稱理從制有何不可儉又答淵難曰含閏之義通儒所難但祥本應朞屈而不遂語事則名體具存論哀則情無以異迹雖數月義實計年閏是年之歸餘故宜揔而苞之朞而兩祥緣尊故屈祥則沒閏象年所申屈申兼著二途具舉經紀之旨其在茲乎如使五月小祥六月乃閏則祥之去縞事成二月是為十一月以象前朞二朔以放後歲名有區域不得相參魯襄二十八年十二月乙未楚子卒唯書上月初不言閏此又附上之明義也鄭射王賀唯云朞則沒閏初不復區別杖朞之中祥將謂不㑦言矣成休甫云大祥後禫有閏別數之明杖朞之祥不得方於綅縞之未即恩如彼就例如此淵又據舊義難儉十餘問儉隨事解釋祠部郎中王珪之議謂喪以閏施功衰以下小祥值閏則略而不言今雖厭祥名猶存異於餘服計月為數屈追慕之心以遠為邇日既餘分月非正朔含而全制於情唯允僕射儉議理據詳博謹所附同今司徒淵始雖疑難再經往反未同儉議依舊八座丞郎通共博議為允以來五月晦小祥其祥禫自依常限奏御班下內外詔可建元三年太子穆妃薨南郡王聞喜公國臣疑制君母服儉又議禮庶人為國君齊衰先儒云庶人在官若府史之屬是也又諸侯之大夫妻為夫人服繐衰七月以此輕微踈遠故不得盡禮今皇孫自是蕃國之王公太子穆妃是天朝之嫡婦宮臣得申小君之禮國官豈敢為夫人之敬當單衣白帢素帶哭于中門外每臨輒入與宮官同並同上穆妃薨成服日車駕出臨喪朝議疑太子應出門迎儉曰尋禮記服問君所主夫人妻太子嫡婦言國君為此三人為主喪也今鸞輿臨降自以主喪而至雖因事撫慰義不在弔南郡以下不應出門奉迎但奠極所臨禮有變革權去杖絰移立戶外足表情敬無煩止哭皇太子既一宮之主自應以車駕幸宮依常奉候既當成服之日吉凶不容相干宜以衰幘行事望拜止哭率由舊章尊駕不以臨弔奉迎則惟常體求之情禮如為可安南齊書文惠太子傳心制終二十七月隋書禮儀志朞服降為大功皆不可以婚嫁同上引徐爰王文憲並云春秋左氏傳襄十八年寢苫枕草王儉云夏枕凷冬枕草陸德明春秋釋文
